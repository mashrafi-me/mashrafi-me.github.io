<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Password Generator</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
    background:
    radial-gradient(circle at top left,#10b98120,transparent 30%),
    radial-gradient(circle at bottom right,#06b6d420,transparent 30%),
    #030712;
}

.glass{
    backdrop-filter: blur(18px);
    background: rgba(17,24,39,.65);
    border: 1px solid rgba(255,255,255,.08);
}

.toast{
    animation: slideUp .35s ease;
}

@keyframes slideUp{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>

<body class="text-white min-h-screen flex items-center justify-center px-5">

<div class="w-full max-w-2xl">

    <div class="glass rounded-3xl p-8 md:p-10 shadow-2xl">

        <h1 class="text-4xl font-bold text-center">
            Password Generator
        </h1>

        <p class="text-center text-gray-400 mt-3">
            Generate strong, secure and professional passwords
        </p>

        <!-- PASSWORD BOX -->
        <div class="mt-8">

            <div class="flex gap-3">

                <input
                    id="password"
                    type="password"
                    readonly
                    class="w-full bg-gray-900 border border-gray-700 rounded-2xl p-5 text-center text-xl md:text-2xl font-mono outline-none"
                >

                <button
                    onclick="togglePassword()"
                    class="bg-gray-800 hover:bg-gray-700 px-5 rounded-2xl transition"
                >
                    👁
                </button>

                <button
                    onclick="copyPassword()"
                    class="bg-emerald-500 hover:bg-emerald-600 text-black font-bold px-5 rounded-2xl transition"
                >
                    📋
                </button>

            </div>

        </div>

        <!-- STRENGTH -->
        <div class="mt-5">

            <div class="flex justify-between text-sm mb-2">
                <span>Password Strength</span>
                <span id="strengthText">Strong</span>
            </div>

            <div class="h-3 bg-gray-800 rounded-full overflow-hidden">

                <div
                    id="strengthBar"
                    class="h-full rounded-full transition-all duration-300"
                ></div>

            </div>

        </div>

        <!-- LENGTH -->
        <div class="mt-8">

            <div class="flex justify-between mb-3">
                <span>Password Length</span>
                <span id="lenValue" class="font-bold text-emerald-400">16</span>
            </div>

            <input
                id="length"
                type="range"
                min="6"
                max="64"
                value="16"
                class="w-full accent-emerald-500"
            >

        </div>

        <!-- BUTTON -->
        <button
            onclick="generatePassword()"
            class="mt-8 w-full bg-emerald-500 hover:bg-emerald-600 text-black font-bold py-4 rounded-2xl text-lg transition duration-300"
        >
            Generate Secure Password
        </button>

    </div>

</div>

<script>

const UPPER="ABCDEFGHIJKLMNOPQRSTUVWXYZ";
const LOWER="abcdefghijklmnopqrstuvwxyz";
const NUMBER="0123456789";
const SYMBOL="!@#$%^&*()_+[]{}|;:,.<>?";

function secureRandom(max){
    const array = new Uint32Array(1);
    crypto.getRandomValues(array);
    return array[0] % max;
}

function randomChar(chars){
    return chars[secureRandom(chars.length)];
}

function shuffle(array){

    for(let i=array.length-1;i>0;i--){

        const j=secureRandom(i+1);

        [array[i],array[j]]=
        [array[j],array[i]];
    }

    return array;
}

function generatePassword(){

    const length=
    parseInt(document.getElementById("length").value);

    let pools=[];
    let password=[];

    pools.push(UPPER);
    password.push(randomChar(UPPER));

    pools.push(LOWER);
    password.push(randomChar(LOWER));

    pools.push(NUMBER);
    password.push(randomChar(NUMBER));

    pools.push(SYMBOL);
    password.push(randomChar(SYMBOL));

    const allChars=pools.join("");

    while(password.length<length){
        password.push(randomChar(allChars));
    }

    password=shuffle(password);

    const finalPassword=password.join("");

    document.getElementById("password").value=finalPassword;

    updateStrength(finalPassword);
}

function updateStrength(password){

    let score=0;

    if(password.length>=8) score++;
    if(password.length>=12) score++;
    if(password.length>=16) score++;

    if(/[A-Z]/.test(password)) score++;
    if(/[a-z]/.test(password)) score++;
    if(/[0-9]/.test(password)) score++;
    if(/[^A-Za-z0-9]/.test(password)) score++;

    const bar=
    document.getElementById("strengthBar");

    const text=
    document.getElementById("strengthText");

    if(score<=3){

        bar.style.width="33%";
        bar.className="h-full bg-red-500 rounded-full transition-all duration-300";
        text.textContent="Weak";

    }else if(score<=5){

        bar.style.width="66%";
        bar.className="h-full bg-yellow-500 rounded-full transition-all duration-300";
        text.textContent="Medium";

    }else{

        bar.style.width="100%";
        bar.className="h-full bg-emerald-500 rounded-full transition-all duration-300";
        text.textContent="Strong";
    }
}

function copyPassword(){

    const password=
    document.getElementById("password").value;

    if(!password) return;

    navigator.clipboard.writeText(password);

    showToast("Password copied successfully");
}

function togglePassword(){

    const field=
    document.getElementById("password");

    field.type=
    field.type==="password"
    ? "text"
    : "password";
}

function showToast(message){

    const toast=
    document.createElement("div");

    toast.className=
    "toast fixed bottom-5 right-5 bg-emerald-500 text-black px-5 py-3 rounded-xl font-semibold shadow-lg z-50";

    toast.textContent=message;

    document.body.appendChild(toast);

    setTimeout(()=>{
        toast.remove();
    },2500);
}

document
.getElementById("length")
.addEventListener("input",e=>{

    document.getElementById("lenValue")
    .textContent=e.target.value;

    generatePassword();
});

generatePassword();

</script>

</body>
</html>
