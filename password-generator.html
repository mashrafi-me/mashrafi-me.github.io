<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator - Mashrafi</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">

  <div class="max-w-xl mx-auto pt-20 px-6">
    <a href="index.html" class="inline-flex items-center gap-2 text-emerald-400 hover:text-emerald-300 mb-10">
      ← Back to Home
    </a>

    <h1 class="text-4xl font-bold text-center mb-2">Password Generator</h1>
    <p class="text-center text-gray-400 mb-12">Generate strong & secure passwords</p>

    <div class="bg-gray-900 rounded-3xl p-10">
      <div class="flex gap-3 mb-8">
        <input id="password" type="text" readonly
               class="flex-1 bg-gray-800 text-3xl font-mono p-6 rounded-2xl focus:outline-none border border-gray-700 text-center">
        <button onclick="copyPassword()" 
                class="bg-gray-700 hover:bg-gray-600 px-8 rounded-2xl text-2xl transition">
          📋
        </button>
      </div>

      <div class="space-y-6">
        <div>
          <label class="block text-gray-400 mb-2">Length: <span id="lenValue" class="font-semibold text-emerald-400">16</span></label>
          <input type="range" id="length" min="6" max="32" value="16" 
                 class="w-full accent-emerald-500" oninput="updateLength()">
        </div>

        <div class="grid grid-cols-2 gap-4">
          <label class="flex items-center gap-3 cursor-pointer">
            <input type="checkbox" id="uppercase" checked class="accent-emerald-500 w-5 h-5"> Uppercase
          </label>
          <label class="flex items-center gap-3 cursor-pointer">
            <input type="checkbox" id="lowercase" checked class="accent-emerald-500 w-5 h-5"> Lowercase
          </label>
          <label class="flex items-center gap-3 cursor-pointer">
            <input type="checkbox" id="numbers" checked class="accent-emerald-500 w-5 h-5"> Numbers
          </label>
          <label class="flex items-center gap-3 cursor-pointer">
            <input type="checkbox" id="symbols" class="accent-emerald-500 w-5 h-5"> Symbols
          </label>
        </div>
      </div>

      <button onclick="generatePassword()" 
              class="mt-10 w-full bg-emerald-500 hover:bg-emerald-600 text-black font-bold py-5 rounded-2xl text-xl transition">
        Generate Password
      </button>
    </div>
  </div>

  <script>
    function generatePassword() {
      const length = parseInt(document.getElementById('length').value);
      const upper = document.getElementById('uppercase').checked;
      const lower = document.getElementById('lowercase').checked;
      const num = document.getElementById('numbers').checked;
      const sym = document.getElementById('symbols').checked;

      let chars = "";
      if (upper) chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
      if (lower) chars += "abcdefghijklmnopqrstuvwxyz";
      if (num) chars += "0123456789";
      if (sym) chars += "!@#$%^&*()_+[]{}|;:,.<>?";

      if (chars === "") {
        alert("Please select at least one option!");
        return;
      }

      let password = "";
      for (let i = 0; i < length; i++) {
        password += chars[Math.floor(Math.random() * chars.length)];
      }

      document.getElementById('password').value = password;
    }

    function copyPassword() {
      const passField = document.getElementById('password');
      if (passField.value) {
        navigator.clipboard.writeText(passField.value);
        alert("Password copied to clipboard!");
      }
    }

    function updateLength() {
      document.getElementById('lenValue').textContent = document.getElementById('length').value;
    }

    // Generate on load
    window.onload = generatePassword;
  </script>
</body>
</html>
